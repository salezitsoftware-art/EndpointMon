version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: endpointwatch-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: endpointwatch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password_change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d endpointwatch"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: endpointwatch-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres_password_change_me@db:5432/endpointwatch
      API_KEY: prod_api_key_replace_me
      SECRET_KEY: prod_secret_key_replace_me
      AI_PROVIDER: auto
      AI_MODEL: gpt-4o-mini
      OPENAI_API_KEY: ""
      OPENAI_BASE_URL: https://api.openai.com/v1
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: endpointwatch-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
